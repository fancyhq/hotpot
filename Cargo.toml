[package]
name = "hotpot"
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = []
repository = "https://github.com/fancyhq/hotpot"

[dependencies]
anyhow = "1.0.102"
indoc = "2.0.7"
nanoid = "0.5.0"
serde = { version = "1.0.228", features = ["derive"] }
toml = "1.1.2"
toml_edit = { version = "0.25.11", features = ["serde"] }
chrono = { version = "0.4", default-features = false, features = [
    "clock",
    "serde",
] }
