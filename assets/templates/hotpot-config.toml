# Hotpot project configuration.
#
# This file is created once by `hotpot init` / `hotpot update` and is NEVER
# overwritten on subsequent runs — Hotpot treats it as user-owned. Edit any
# key below by uncommenting the line and setting your value. Delete the file
# (and re-run `hotpot init`) to regenerate it with the latest documentation.
#
# Every key is optional; commented-out defaults match Hotpot's built-in
# behavior, so an unedited file is equivalent to "use defaults everywhere".

# ─── Natural-language settings ──────────────────────────────────────────────

# Language Hotpot's slash commands use when replying to the user. The four
# platform prompts read this value at runtime and translate their final
# response accordingly. Code output (panic messages, CLI errors) stays in
# English regardless of this setting.
#
# Examples: "English", "简体中文", "日本語", "Français".
# Default: "English".
#
# language = "English"

# ─── Worktree settings ──────────────────────────────────────────────────────
#
# Controls the optional per-task git-worktree feature triggered at the start
# of `/hotpot:execute`. When the user opts in, Hotpot runs:
#   git worktree add -b hotpot/<task-id> <base_dir>/<task-id>
# and records the path on the task row in `overview.jsonl`.
#
# [worktree]

# Directory where `hotpot worktree create` materializes per-task worktrees.
# Relative paths resolve against the project root; absolute paths are used
# as-is. The default location lives under `.hotpot/`, which is already
# git-ignored by the block Hotpot manages in your `.gitignore`, so worktrees
# stay untracked automatically.
#
# Default: ".hotpot/worktrees".
#
# base_dir = ".hotpot/worktrees"
