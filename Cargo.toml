[package]
name = "hotpot"
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = []
repository = "https://github.com/fancyhq/hotpot"

[dependencies]
anyhow = "1.0.102"
indoc = "2.0.7"
nanoid = "0.5.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
chrono = { version = "0.4.44", default-features = false, features = [
    "clock",
    "serde",
] }
clap = { version = "4.6.1", features = ["derive"] }
tiny_http = "0.12.0"
