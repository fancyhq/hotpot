# Hotpot Codex project hooks.
#
# PreToolUse matcher is tool-name only, so Bash covers every Bash call; this
# lightweight context is intentionally cheap enough for that broader trigger.
# Edit|Write covers file edits.

[features]
hooks = true

[[hooks.PreToolUse]]
matcher = "Edit|Write"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "hotpot hook codex pre-tool-use"

[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = "hotpot hook codex session-start"
