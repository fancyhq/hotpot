# Release Please workflow for the hotpot Rust crate.
# hotpot Rust crate 的 Release Please 工作流。
#
# Behavior:
# - On every push to `main`, release-please creates or updates a single
#   Release PR that aggregates conventional commits since the last release.
# - Merging a feature branch into `main` does NOT immediately create a tag
#   or GitHub Release. Only a maintainer merging the Release PR triggers
#   the actual version release (tag + GitHub Release + changelog update).
# - When a release is created, this workflow also builds and uploads
#   release binaries for Windows, macOS (x86_64 + aarch64), and Linux
#   (x86_64 + aarch64), along with SHA256 checksum files, and publishes
#   to npm, crates.io, and Chocolatey.
# - Version selection is controlled by release-please. To force a specific
#   next release version, merge a conventional commit that includes a
#   `Release-As: x.y.z` footer.
# 行为说明：
# - 每次 push 到 main 分支时，release-please 创建或更新同一个 Release PR，
#   汇聚自上次发布以来的所有 conventional commits。
# - 普通功能分支合并到 main 不会立即创建 tag 或 GitHub Release。
#   只有维护者人工合并 Release PR 后，release-please 才创建 tag、
#   GitHub Release 并更新 changelog。
# - 当 release 创建后，此 workflow 还会为 Windows、macOS（x86_64 + aarch64）
#   和 Linux（x86_64 + aarch64）编译 release 二进制，上传压缩包和 SHA256 校验文件，
#   并发布到 npm、crates.io 和 Chocolatey。
# - 版本号由 release-please 控制。若要强制指定下一次发布版本，合入一条包含
#   `Release-As: x.y.z` footer 的 conventional commit。
#
# See: https://github.com/googleapis/release-please-action
# See: https://github.com/googleapis/release-please
# See: https://doc.rust-lang.org/cargo/commands/cargo-publish.html

name: Release Please

on:
  push:
    branches:
      - main
  # Manual trigger as a fallback if the auto-trigger misses a push.
  # 手动触发，作为自动触发遗漏时的补救入口。
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # release-please: Create or update Release PR; on merge, create tag+release.
  # release-please：创建或更新 Release PR；合并后创建 tag+release。
  # ---------------------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Expose release_created and tag_name so downstream jobs can gate
      # and identify the release.
      # 暴露 release_created 和 tag_name，供后续 job 做 gate 判断和版本识别。
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ---------------------------------------------------------------------------
  # Build and upload release binary assets for all target platforms.
  # Only runs when release-please actually created a GitHub Release/tag.
  # 编译并上传所有目标平台的 release 二进制产物。
  # 仅在 release-please 实际创建了 GitHub Release/tag 时运行。
  # ---------------------------------------------------------------------------
  build-release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      # One platform failure should not block others (e.g. aarch64 cross
      # compilation may fail while x86_64 works fine).
      # 单个平台失败不应阻塞其他平台。
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            archive_ext: .zip
            asset_label: windows-x86_64
          # Build the Intel macOS target from the current hosted macOS image
          # instead of requesting `macos-13`. The `macos-13` Intel runner can
          # sit in the queue for a long time before compilation even starts,
          # while Rust can cross-compile this target from Apple Silicon macOS.
          # 使用当前托管 macOS 镜像交叉编译 Intel macOS 目标，避免请求
          # `macos-13` Intel runner 时长时间排队。
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            archive_ext: .tar.gz
            asset_label: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            archive_ext: .tar.gz
            asset_label: macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            archive_ext: .tar.gz
            asset_label: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
            archive_ext: .tar.gz
            asset_label: linux-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        # Checkout the exact tag created by release-please so the built
        # binary has the correct version embedded via Cargo.toml.
        # 检出 release-please 创建的精确 tag，确保编译的二进制中
        # Cargo.toml 版本号正确。
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # For Linux aarch64 cross-compilation we install the aarch64 GNU
      # cross-linker. The project has no complex native C dependencies
      # (libc/fs2 use standard syscall bindings), so a simple cross-linker
      # is sufficient — no need for `cross`, `actions-rust-cross`, or other
      # heavier tooling.
      # 对于 Linux aarch64 交叉编译，需安装 aarch64 GNU 交叉链接器。
      # 项目没有复杂的本地 C 依赖（libc/fs2 仅使用标准系统调用接口），
      # 因此简单的交叉链接器即可满足需求，无需引入 `cross`、
      # `actions-rust-cross` 等更重的工具。
      - name: Install cross-linker for Linux aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # Instruct Cargo to use the aarch64 cross-linker when building for
          # that target. Harmless for other targets (the env var is ignored).
          # 通知 Cargo 在编译 aarch64 目标时使用交叉链接器；
          # 对其他目标无影响（环境变量会被忽略）。
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package Windows binary and generate SHA256
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $assetLabel = "${{ matrix.asset_label }}"
          $archive = "hotpot-$tag-$assetLabel${{ matrix.archive_ext }}"
          $binary = "hotpot${{ matrix.suffix }}"

          # Stage the binary at the root of the archive (no nested path).
          # 将二进制文件放在压缩包根目录（无嵌套路径）。
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$binary" "staging/$binary"

          Compress-Archive -Path "staging/$binary" -DestinationPath $archive -Force

          # Generate SHA256 checksum in the standard format: <hash>  <filename>
          # 以标准格式生成 SHA256 校验文件。
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ASCII "$archive.sha256"

          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package Unix binary and generate SHA256
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ASSET_LABEL="${{ matrix.asset_label }}"
          EXT="${{ matrix.archive_ext }}"
          ARCHIVE="hotpot-${TAG}-${ASSET_LABEL}${EXT}"
          BINARY="hotpot${{ matrix.suffix }}"

          # Stage the binary at the root of the archive (no nested path).
          # 将二进制文件放在压缩包根目录（无嵌套路径）。
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${BINARY}" staging/

          (cd staging && tar czf "../${ARCHIVE}" "${BINARY}")

          # Generate SHA256 checksum in the standard format: <hash>  <filename>
          # 以标准格式生成 SHA256 校验文件。
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "${TAG}" "${ARCHIVE}" "${ARCHIVE}.sha256" --clobber

  # ---------------------------------------------------------------------------
  # Publish the Rust crate to crates.io.
  # Requires the CARGO_REGISTRY_TOKEN repository secret.
  # 将 Rust crate 发布到 crates.io。
  # 需要设置 CARGO_REGISTRY_TOKEN 仓库 secret。
  # ---------------------------------------------------------------------------
  publish-crates-io:
    needs:
      - release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Checkout the exact release tag so Cargo.toml has the correct version.
        # 检出精确 release tag，确保 Cargo.toml 版本正确。
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Dry-run first to catch packaging issues before publishing.
      # 先 dry-run，在正式发布前发现打包问题。
      - name: Validate crate packaging
        run: cargo package --locked --no-verify

      # Publish to crates.io.
      # If CARGO_REGISTRY_TOKEN is missing, cargo will fail with an auth error,
      # preventing a silent skip of the release.
      # 发布到 crates.io。
      # 如果缺少 CARGO_REGISTRY_TOKEN，cargo 将因认证错误而失败，
      # 避免正式 release 静默跳过发布。
      - name: Publish to crates.io
        run: cargo publish --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  # ---------------------------------------------------------------------------
  # Build and publish the Chocolatey package.
  # Requires the CHOCO_API_KEY repository secret.
  # Downloads SHA256 checksums from the release and runs the manifest
  # update script to inject the correct version and checksum into
  # hotpot.nuspec and chocolateyInstall.ps1 before packing.
  # 构建并发布 Chocolatey 包。
  # 需要设置 CHOCO_API_KEY 仓库 secret。
  # 从 release 下载 SHA256 校验文件并运行清单更新脚本，
  # 在打包前将正确的版本和校验和注入到 hotpot.nuspec 和
  # chocolateyInstall.ps1 中。
  # ---------------------------------------------------------------------------
  publish-chocolatey:
    needs:
      - release-please
      - build-release-assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        # Checkout the exact release tag so the nuspec has the correct version.
        # 检出精确 release tag，确保 nuspec 版本正确。
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # Download SHA256 checksum files and run the Chocolatey update script
      # so that chocolateyInstall.ps1 has the correct $version and
      # $checksum64 before choco pack runs.
      # 下载 SHA256 校验文件并运行 Chocolatey 更新脚本，
      # 确保 choco pack 执行前 chocolateyInstall.ps1
      # 具有正确的 $version 和 $checksum64。
      - name: Download SHA256 checksum files from release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          mkdir -p sha256
          gh release download "${TAG}" --pattern "*.sha256" --dir sha256
          echo "Downloaded SHA256 files:"
          ls -la sha256/

      - name: Update Chocolatey package files
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          scripts/update-release-package-manifests.sh "${TAG}" sha256

      - name: Install Chocolatey
        shell: pwsh
        run: |
          # Chocolatey is pre-installed on windows-latest; ensure it's available.
          # Chocolatey 在 windows-latest 上已预装；确保它可用。
          choco --version

      - name: Build Chocolatey package
        shell: pwsh
        run: |
          choco pack packaging/chocolatey/hotpot.nuspec --output-directory packaging/chocolatey/

      - name: Push Chocolatey package
        shell: pwsh
        run: |
          # Derive semver version from the tag (strip "hotpot-v" prefix).
          # 从 tag 中提取 semver 版本（去掉 "hotpot-v" 前缀）。
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $version = $tag -replace '^hotpot-v', ''
          choco push "packaging/chocolatey/hotpot.$version.nupkg" `
            --api-key "${{ secrets.CHOCO_API_KEY }}" `
            --source https://push.chocolatey.org/

  # ---------------------------------------------------------------------------
  # Publish the npm wrapper package to the npm registry.
  # Requires the NPM_TOKEN repository secret to be set.
  # 将 npm wrapper 包发布到 npm registry。
  # 需要设置 NPM_TOKEN 仓库 secret。
  # ---------------------------------------------------------------------------
  publish-npm:
    needs:
      - release-please
      - build-release-assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Checkout the exact release tag so npm/package.json has the
        # correct version that matches the Rust crate.
        # 检出精确 release tag，确保 npm/package.json 版本与 Rust crate 一致。
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=18"
          registry-url: "https://registry.npmjs.org"

      # Dry-run first to catch packaging issues before publishing.
      # 先 dry-run，在正式发布前发现打包问题。
      - name: Dry-run npm pack
        run: npm pack --dry-run ./npm

      # Publish the npm package.
      # The package is scoped under @fancyhq; --access public is required
      # because scoped packages default to private on npm.
      # If NPM_TOKEN is missing, npm will fail with an authentication error,
      # preventing a silent skip of the release.
      # 发布 npm 包。包位于 @fancyhq scope 下，需要 --access public，
      # 因为 scoped 包在 npm 上默认为私有。
      # 如果缺少 NPM_TOKEN，npm 将因认证错误而失败，
      # 避免正式 release 静默跳过 npm 发布。
      - name: Publish to npm
        run: npm publish ./npm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
